# Vespera World Ops Homebase
# Simplified for Dokploy — services: n8n, Budibase, code-server
# Appwrite already running externally, not included

name: vespera-ops

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: n8n.deploy.vesperaworld.com
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: https://n8n.deploy.vesperaworld.com/
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - vespera-net

  budibase:
    image: budibase/budibase:latest
    restart: unless-stopped
    environment:
      JWT_SECRET: ${BUDIBASE_JWT_SECRET}
      MINIO_ACCESS_KEY: ${BUDIBASE_MINIO_KEY}
      MINIO_SECRET_KEY: ${BUDIBASE_MINIO_SECRET}
      REDIS_PASSWORD: ${BUDIBASE_REDIS_PASSWORD}
      INTERNAL_API_KEY: ${BUDIBASE_INTERNAL_KEY}
      SELF_HOSTED: "1"
      BUDIBASE_ENVIRONMENT: production
      PORT: 10000
    volumes:
      - budibase_data:/data
    networks:
      - vespera-net

  code-server:
    image: codercom/code-server:latest
    restart: unless-stopped
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD}
    volumes:
      - code_data:/home/coder/projects
    command: --bind-addr 0.0.0.0:8080 --auth password /home/coder/projects
    networks:
      - vespera-net

volumes:
  n8n_data:
  budibase_data:
  code_data:

networks:
  vespera-net:
    driver: bridge
