# Vespera World — Ops Homebase
# Docker Compose stack for Dokploy
# Services: n8n, Budibase, code-server, Appwrite

name: vespera-ops

services:
  # ────────────────────────────────────────────
  # n8n — Visual workflow automation
  # ────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST:-n8n.localhost}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: https://${N8N_HOST:-n8n.localhost}/
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vespera-net

  # ────────────────────────────────────────────
  # Budibase — Low-code internal tool builder
  # ────────────────────────────────────────────
  budibase:
    image: budibase/budibase:latest
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      JWT_SECRET: ${BUDIBASE_JWT_SECRET}
      MINIO_ACCESS_KEY: ${BUDIBASE_MINIO_KEY}
      MINIO_SECRET_KEY: ${BUDIBASE_MINIO_SECRET}
      REDIS_PASSWORD: ${BUDIBASE_REDIS_PASSWORD}
      INTERNAL_API_KEY: ${BUDIBASE_INTERNAL_KEY}
      SELF_HOSTED: "1"
      BUDIBASE_ENVIRONMENT: production
      PORT: 10000
    volumes:
      - budibase_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - vespera-net

  # ────────────────────────────────────────────
  # code-server — Browser-based VS Code
  # ────────────────────────────────────────────
  code-server:
    image: codercom/code-server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD}
    volumes:
      - code_data:/home/coder/projects
      - /var/run/docker.sock:/var/run/docker.sock
    command: --bind-addr 0.0.0.0:8080 --auth password /home/coder/projects
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - vespera-net

  # ────────────────────────────────────────────
  # Appwrite — Self-hosted backend-as-a-service
  #   (auth, database, storage, functions)
  # ────────────────────────────────────────────
  appwrite:
    image: appwrite/appwrite:1.5
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APPWRITE_ENV: production
      APPWRITE_VERSION: "1.5"
      _APP_DOMAIN: ${APPWRITE_DOMAIN:-appwrite.localhost}
      _APP_DOMAIN_TARGET: ${APPWRITE_DOMAIN:-appwrite.localhost}
      _APP_CONSOLE_WHITELIST_EMAILS: ${APPWRITE_WHITELIST_EMAILS}
      _APP_CONSOLE_WHITELIST_IPS: ${APPWRITE_WHITELIST_IPS}
      _APP_SYSTEM_EMAIL_NAME: ${APPWRITE_EMAIL_NAME:-Vespera}
      _APP_SYSTEM_EMAIL_ADDRESS: ${APPWRITE_EMAIL_ADDRESS:-noreply@vesperaworld.com}
      _APP_REDIS_HOST: redis
      _APP_REDIS_PORT: 6379
      _APP_REDIS_USER: ""
      _APP_REDIS_PASS: ${REDIS_PASSWORD}
      _APP_DB_HOST: mariadb
      _APP_DB_PORT: 3306
      _APP_DB_SCHEMA: appwrite
      _APP_DB_USER: root
      _APP_DB_PASS: ${MARIADB_ROOT_PASSWORD}
      _APP_SMTP_HOST: ${SMTP_HOST}
      _APP_SMTP_PORT: ${SMTP_PORT}
      _APP_SMTP_SECURE: ${SMTP_SECURE}
      _APP_SMTP_USERNAME: ${SMTP_USER}
      _APP_SMTP_PASSWORD: ${SMTP_PASSWORD}
      _APP_USAGE_STATS: enabled
      _APP_STORAGE_LIMIT: 30000000
      _APP_STORAGE_PREVIEW_LIMIT: 20000000
      _APP_STORAGE_ANTIVIRUS: disabled
      _APP_FUNCTIONS_SIZE_LIMIT: 30000000
      _APP_FUNCTIONS_TIMEOUT: 900
      _APP_FUNCTIONS_BUILD_TIMEOUT: 900
      _APP_FUNCTIONS_CONTAINERS: 10
      _APP_FUNCTIONS_CPUS: 1
      _APP_FUNCTIONS_MEMORY: 512
      _APP_FUNCTIONS_MEMORY_SWAP: 512
      _APP_EXECUTOR_SECRET: ${APPWRITE_EXECUTOR_SECRET}
      _APP_LOGGING_PROVIDER: ""
      _APP_LOGGING_CONFIG: ""
      _APP_MAINTENANCE_INTERVAL: 86400
      _APP_MAINTENANCE_RETENTION_EXECUTION: 1209600
      _APP_MAINTENANCE_RETENTION_AUDIT: 1209600
      _APP_MAINTENANCE_RETENTION_ABUSE: 86400
    volumes:
      - appwrite_uploads:/storage/uploads
      - appwrite_cache:/storage/cache
      - appwrite_config:/storage/config
      - appwrite_certificates:/storage/certificates
      - appwrite_functions:/storage/functions
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vespera-net

  mariadb:
    image: mariadb:10.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: appwrite
      MYSQL_USER: appwrite
      MYSQL_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - vespera-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vespera-net

volumes:
  n8n_data:
  budibase_data:
  code_data:
  appwrite_uploads:
  appwrite_cache:
  appwrite_config:
  appwrite_certificates:
  appwrite_functions:
  mariadb_data:
  redis_data:

networks:
  vespera-net:
    driver: bridge
